<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coffee Delivery - Success</title>

  <link rel="preconnect" href="[fonts.googleapis.com](https://fonts.googleapis.com)">
  <link rel="preconnect" href="[fonts.gstatic.com](https://fonts.gstatic.com)" crossorigin>
  <link
    href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Roboto:wght@400;500;700&display=swap)"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo">
        <span class="logo-icon">☕</span>
        <span class="logo-text">
          <strong>Coffee</strong>
          <small>Delivery</small>
        </span>
      </a>

      <div class="header-actions">
        <div class="location-badge">
          <span>📍</span>
          New York, NY
        </div>

        <a href="checkout.html" class="header-cart active">
          🛒
        </a>
      </div>
    </div>
  </header>

  <main class="success-main">
    <div class="container success-layout">
      <section class="success-content">
        <h1>Uhu! Order confirmed</h1>
        <p>Now just wait and your coffee will soon arrive to you.</p>

        <div class="success-box">
          <div class="success-item">
            <span class="success-icon purple">📍</span>
            <div>
              <p>Delivery to <strong>Rua João Daniel Martinelli, 102</strong></p>
              <p>Farrapos - Porto Alegre, RS</p>
            </div>
          </div>

          <div class="success-item">
            <span class="success-icon yellow">⏱</span>
            <div>
              <p>Estimated delivery time</p>
              <p><strong>20 min - 30 min</strong></p>
            </div>
          </div>

          <div class="success-item">
            <span class="success-icon yellow-dark">💳</span>
            <div>
              <p>Payment on delivery</p>
              <p><strong>Credit Card</strong></p>
            </div>
          </div>
        </div>
      </section>

      <section class="delivery-art">
        <img
          class="delivery-person"
          src="https://play-lh.googleusercontent.com/rVMpGD7zlIKqc_lWS-rTe97Sa8QwIsD_39gvZRkrAAK9Qcy8fcJdhgaub1ePiArznw"
          alt="Instant delivery illustration"
          style="max-width: 320px; width: 100%; height: auto; display: block; margin: 0 auto;"
        >
      </section>
    </div>
  </main>

</body>
</html>
